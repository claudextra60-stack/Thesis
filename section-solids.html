<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section of Solids - Eng Draw VR</title>
  <link rel="icon" type="image/png" href="https://i.ibb.co/v4FSdxGv/cropped-circle-image.png">
  <meta name="theme-color" content="#2B2B88">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    body { font-family: sans-serif; margin: 0; overflow: hidden; background: #000; }
    
    #loading {
      position: fixed; inset: 0; background: #111; z-index: 999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; font-weight: 300; letter-spacing: 2px;
    }

    #overlay {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(135deg, rgba(15,15,20,0.95) 0%, rgba(30,30,60,0.92) 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; text-align: center;
    }
    h1 { font-weight: 800; font-size: 3rem; margin: 0 0 10px 0; letter-spacing: -1px; text-transform: uppercase; }
    p { color: #aaa; font-size: 1.1rem; max-width: 700px; line-height: 1.6; margin-bottom: 30px; }
    
    .controls-hint {
        background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 8px;
        text-align: left; font-size: 0.9rem; color: #ddd; margin-bottom: 30px;
    }
    .controls-hint strong { color: #fff; margin-right: 10px; }

    .btn {
      padding: 16px 48px; font-size: 1rem; font-weight: 600;
      background: #2B2B88; color: white; border: none; border-radius: 6px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.2s ease;
    }
    .btn:hover { background: #3d3db5; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(43,43,136,0.5); }
  </style>

  <script>
    // ─── GLOBAL CLIPPING PLANE ──────────────────────────────
    // This plane is updated by the right controller every frame
    window.globalClipPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1), 0);

    // ─── COMPONENT: LASER CLIPPER (Right Hand) ──────────────
    AFRAME.registerComponent('laser-clipper', {
      tick: function () {
        // Get the world position and rotation of the controller
        let pos = new THREE.Vector3();
        let dir = new THREE.Vector3(0, 0, -1); // Cutting normal faces away from user
        
        this.el.object3D.getWorldPosition(pos);
        dir.applyQuaternion(this.el.object3D.getWorldQuaternion(new THREE.Quaternion()));

        // Update the global clipping plane math
        window.globalClipPlane.setFromNormalAndCoplanarPoint(dir, pos);
      }
    });

    // ─── COMPONENT: CLIPPABLE SOLID GENERATOR ───────────────
    AFRAME.registerComponent('clippable-solid', {
      schema: {
        type: {type: 'string', default: 'cone'},
        color: {type: 'color', default: '#3A0CA3'},
        cutColor: {type: 'color', default: '#FEE440'} // Neon Yellow for cut face
      },
      init: function () {
        // Enable clipping on the WebGL renderer
        this.el.sceneEl.renderer.localClippingEnabled = true;
        this.generateMesh();
      },
      update: function () {
        this.generateMesh();
      },
      generateMesh: function () {
        // Clean up old meshes
        while(this.el.object3D.children.length > 0){ 
            this.el.object3D.remove(this.el.object3D.children[0]); 
        }

        let geometry;
        if(this.data.type === 'cone') geometry = new THREE.ConeGeometry(0.3, 0.8, 32);
        else if(this.data.type === 'cylinder') geometry = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 32);
        else if(this.data.type === 'pyramid') geometry = new THREE.ConeGeometry(0.4, 0.8, 4); // Square pyramid
        else if(this.data.type === 'prism') geometry = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 6); // Hex prism
        
        // 1. The Outer Hull (Standard rendering, gets clipped)
        let outerMaterial = new THREE.MeshStandardMaterial({
            color: this.data.color,
            roughness: 0.4,
            metalness: 0.1,
            clippingPlanes: [window.globalClipPlane],
            side: THREE.FrontSide
        });
        let outerMesh = new THREE.Mesh(geometry, outerMaterial);

        // 2. The Inner Solid Cap Illusion (Renders inside faces, clipped)
        // By using BackSide and a distinct color, it creates the illusion of a solid interior
        let innerMaterial = new THREE.MeshBasicMaterial({
            color: this.data.cutColor,
            clippingPlanes: [window.globalClipPlane],
            side: THREE.BackSide
        });
        let innerMesh = new THREE.Mesh(geometry, innerMaterial);
        // Scale inner mesh down by 1% to prevent Z-fighting at the edges
        innerMesh.scale.set(0.99, 0.99, 0.99);

        // Add both to entity
        this.el.object3D.add(outerMesh);
        this.el.object3D.add(innerMesh);
      }
    });

    // ─── COMPONENT: PUZZLE LOGIC (Left Hand Trigger) ────────
    AFRAME.registerComponent('puzzle-extractor', {
      init: function () {
        this.el.addEventListener('triggerdown', (e) => {
            if(this.el.components.haptics) this.el.components.haptics.pulse(1.0, 100);
            this.el.sceneEl.emit('extract-true-shape');
        });
      }
    });
  </script>
</head>

<body>
  <div id="loading">LOADING MODULE...</div>

  <div id="overlay">
    <h1>SECTION OF SOLIDS</h1>
    <p>Your right hand is now a Laser Clipping Plane. Push it through the floating solids to cut them in real-time. Pull your Left Trigger to analyze the cut angle.</p>
    <div class="controls-hint">
        <div><strong>RIGHT HAND:</strong> Move & Rotate the Glass Cutting Plane</div>
        <div><strong>LEFT TRIGGER:</strong> Submit Cut Angle & Extract True Shape</div>
    </div>
    <button class="btn" id="start-btn">ENTER LAB</button>
  </div>

  <a-scene id="vr-scene" cursor="rayOrigin: mouse" raycaster="objects: .interactive">
    <a-assets>
      <img id="sky-panorama" src="https://dl.polyhaven.org/file/ph-assets/HDRIs/extra/Tonemapped%20JPG/secluded_beach.jpg" crossorigin="anonymous">
      <img id="sand-tex"     src="https://cdn.architextures.org/textures/24/5/sand-j9sy8a.jpg" crossorigin="anonymous">
      <img id="soil-tex"     src="https://cdn.architextures.org/textures/23/5/soil-none-5i4x9p.jpg" crossorigin="anonymous">
      <img id="jute-tex"     src="https://cdn.architextures.org/textures/21/07/hyacinth-weave-60e33404a3929-1200.jpg?s=400&q=60" crossorigin="anonymous">
    </a-assets>

    <a-sky src="#sky-panorama" rotation="0 -90 0"></a-sky>
    
    <a-entity id="environment-group">
        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" src="#sand-tex" repeat="8 8"></a-plane>
        <a-ring position="0 0.01 0" rotation="-90 0 0" radius-inner="10" radius-outer="25" src="#soil-tex" repeat="3 8"></a-ring>
    </a-entity>

    <a-entity light="type: ambient; intensity: 0.8; color: #FFF"></a-entity>
    <a-entity light="type: directional; position: 3 8 3; intensity: 1.2;"></a-entity>

    <a-entity position="0 1.2 -1.5">
        <a-entity id="target-solid" clippable-solid="type: cone; color: #4CC9F0" position="0 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>

        <a-plane width="2.4" height="1.6" position="0 1.0 -1.0" color="#111" opacity="0.9">
            <a-text value="TARGET SHAPE:" position="0 0.6 0.01" align="center" color="#AAA" width="3" letter-spacing="2"></a-text>
            <a-text id="target-shape-text" value="PARABOLA" position="0 0.35 0.01" align="center" color="#FEE440" font="roboto" width="6"></a-text>
            <a-text id="feedback-text" value="Adjust your cutting plane and press Left Trigger." position="0 -0.5 0.01" align="center" color="#FFF" width="2.5"></a-text>
            <a-plane width="2.2" height="0.01" position="0 0 0.01" color="#333"></a-plane>
        </a-plane>
    </a-entity>

    <a-entity id="exercise-ui" position="-2.5 1.4 -0.5" rotation="0 45 0">
        <a-box width="2.0" height="1.2" depth="0.05" src="#jute-tex" repeat="1 1" color="#BBB">
            <a-plane width="1.95" height="1.15" position="0 0 0.026" color="#111" opacity="0.95"></a-plane>
            <a-text value="VIRTUAL SLICER" position="0 0.45 0.05" align="center" width="2.8" font="roboto" color="#FFF" letter-spacing="1"></a-text>
            <a-plane width="1.8" height="0.004" position="0 0.38 0.05" color="#F72585"></a-plane>
            
            <a-text id="desc-text" value="Cut the cone to find the requested Conic Section." position="0 0.15 0.05" align="center" width="1.8" font="roboto" color="#AAA"></a-text>

            <a-plane class="interactive" id="btn-prev" position="-0.5 -0.35 0.05" width="0.6" height="0.15" color="#333">
                <a-text value="< PREV" align="center" width="2" position="0 0 0.01"></a-text>
            </a-plane>
            <a-plane class="interactive" id="btn-next" position="0.5 -0.35 0.05" width="0.6" height="0.15" color="#333">
                <a-text value="NEXT >" align="center" width="2" position="0 0 0.01"></a-text>
            </a-plane>

            <a-text id="level-indicator" value="LEVEL 1 / 10" position="0 -0.5 0.05" align="center" width="2.5" color="#888"></a-text>
        </a-box>
    </a-entity>

    <a-entity id="rig" movement-controls="speed: 0.15">
      <a-entity id="camera" camera position="0 1.5 0.5" look-controls></a-entity>
      
      <a-entity id="left-controller" oculus-touch-controls="hand: left" puzzle-extractor haptics></a-entity>
      
      <a-entity id="right-controller" oculus-touch-controls="hand: right" laser-clipper>
          <a-plane width="1.2" height="1.2" color="#00FFFF" opacity="0.25" material="side: double; depthWrite: false" position="0 0 -0.6"></a-plane>
          <a-box width="1.25" height="0.02" depth="0.02" color="#FFF" position="0 0.6 -0.6"></a-box>
          <a-box width="1.25" height="0.02" depth="0.02" color="#FFF" position="0 -0.6 -0.6"></a-box>
          <a-box width="0.02" height="1.2" depth="0.02" color="#FFF" position="0.6 0 -0.6"></a-box>
          <a-box width="0.02" height="1.2" depth="0.02" color="#FFF" position="-0.6 0 -0.6"></a-box>
          <a-cylinder radius="0.02" height="0.4" color="#333" position="0 0 -0.2" rotation="90 0 0"></a-cylinder>
      </a-entity>
    </a-entity>

    <a-entity id="exit-door" position="0 1.6 4" rotation="0 180 0">
        <a-plane class="interactive" id="btn-home" width="1.5" height="0.6" src="#jute-tex" repeat="1 1" color="#999">
             <a-box width="1.6" height="0.7" depth="0.1" position="0 0 -0.06" color="#333"></a-box>
             <a-text value="EXIT TO MAIN MENU" align="center" width="3" position="0 0 0.02" color="#000" font="roboto"></a-text>
        </a-plane>
    </a-entity>

  </a-scene>

  <script>
    // ─── GAMIFIED CURRICULUM LOGIC ────────────────────────────
    // The slant angle of our cone (radius 0.3, height 0.8) is atan(0.3 / 0.8) ≈ 20.5 degrees from vertical.
    // So the slant edge is at 90 - 20.5 = 69.5 degrees from the horizontal.
    
    const levels = [
        { type: 'cylinder', shape: 'CIRCLE', desc: "Slice parallel to the base.", targetAngleY: 90, tolerance: 10 },
        { type: 'cylinder', shape: 'ELLIPSE', desc: "Slice at an angle across the curved surface.", targetAngleY: 45, tolerance: 30 },
        { type: 'cone', shape: 'CIRCLE', desc: "Slice parallel to the base.", targetAngleY: 90, tolerance: 10 },
        { type: 'cone', shape: 'ELLIPSE', desc: "Slice at a shallow angle.", targetAngleY: 45, tolerance: 20 },
        { type: 'cone', shape: 'PARABOLA', desc: "Slice perfectly parallel to a slant edge.", targetAngleY: 69.5, tolerance: 8 },
        { type: 'cone', shape: 'HYPERBOLA', desc: "Slice parallel to the vertical axis.", targetAngleY: 0, tolerance: 15 },
        { type: 'pyramid', shape: 'SQUARE', desc: "Slice parallel to the base.", targetAngleY: 90, tolerance: 10 },
        { type: 'pyramid', shape: 'TRAPEZIUM', desc: "Slice at an angle cutting the base.", targetAngleY: 45, tolerance: 20 },
        { type: 'prism', shape: 'HEXAGON', desc: "Slice parallel to the base.", targetAngleY: 90, tolerance: 10 },
        { type: 'prism', shape: 'RECTANGLE', desc: "Slice vertically through the prism.", targetAngleY: 0, tolerance: 15 }
    ];

    let currentLevel = 0;
    const solidEl = document.getElementById('target-solid');
    const txtShape = document.getElementById('target-shape-text');
    const txtDesc = document.getElementById('desc-text');
    const txtLevel = document.getElementById('level-indicator');
    const txtFeedback = document.getElementById('feedback-text');

    function loadLevel(idx) {
        if (idx < 0) idx = 0;
        if (idx >= levels.length) idx = levels.length - 1;
        currentLevel = idx;

        const data = levels[idx];
        solidEl.setAttribute('clippable-solid', `type: ${data.type}; color: #4CC9F0`);
        txtShape.setAttribute('value', data.shape);
        txtDesc.setAttribute('value', data.desc);
        txtLevel.setAttribute('value', `LEVEL ${idx + 1} / 10`);
        txtFeedback.setAttribute('value', "Adjust your cutting plane and press Left Trigger.");
        txtFeedback.setAttribute('color', "#FFF");
    }

    // Checking the cut angle when trigger is pulled
    const scene = document.querySelector('a-scene');
    scene.addEventListener('extract-true-shape', () => {
        const data = levels[currentLevel];
        
        // Get the normal of the cutting plane
        const normal = window.globalClipPlane.normal;
        
        // Calculate the angle of the normal relative to the horizontal plane (XZ)
        // normal.y is 1 when plane is completely horizontal (cutting parallel to base)
        // normal.y is 0 when plane is completely vertical
        const currentAngleY = Math.abs(Math.asin(normal.y) * 180 / Math.PI);

        // Check against tolerance
        if (Math.abs(currentAngleY - data.targetAngleY) <= data.tolerance) {
            txtFeedback.setAttribute('value', "SUCCESS! True Shape Found.");
            txtFeedback.setAttribute('color', "#00FF00");
            setTimeout(() => {
                if(currentLevel < levels.length - 1) loadLevel(currentLevel + 1);
            }, 2000);
        } else {
            txtFeedback.setAttribute('value', `Angle Incorrect. Try again.`);
            txtFeedback.setAttribute('color', "#FF0000");
        }
    });

    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('overlay').style.display = 'none';
      if(AudioManager && AudioManager.start) AudioManager.start();
      loadLevel(0);
    });

    document.getElementById('btn-next').addEventListener('click', () => loadLevel(currentLevel + 1));
    document.getElementById('btn-prev').addEventListener('click', () => loadLevel(currentLevel - 1));
    document.getElementById('btn-home').addEventListener('click', () => { window.location.href = 'index.html'; });

    if (scene.hasLoaded) { document.getElementById('loading').style.display = 'none'; } 
    else { scene.addEventListener('loaded', () => { document.getElementById('loading').style.display = 'none'; }); }
  </script>
</body>
</html>
