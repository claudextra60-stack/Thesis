<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    body { font-family: sans-serif; margin: 0; overflow: hidden; background: #000; }
    
    #loading {
      position: fixed; inset: 0; background: #111; z-index: 999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; font-weight: 300; letter-spacing: 2px;
    }

    #overlay {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(135deg, rgba(15,15,20,0.95) 0%, rgba(30,30,60,0.92) 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; text-align: center;
    }
    h1 { font-weight: 800; font-size: 3rem; margin: 0 0 10px 0; letter-spacing: -1px; text-transform: uppercase; }
    p { color: #aaa; font-size: 1.1rem; max-width: 700px; line-height: 1.6; margin-bottom: 30px; }
    
    .controls-hint {
        background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 8px;
        text-align: left; font-size: 0.9rem; color: #ddd; margin-bottom: 30px;
    }

    .btn {
      padding: 16px 48px; font-size: 1rem; font-weight: 600;
      background: #2B2B88; color: white; border: none; border-radius: 6px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.2s ease;
    }
    .btn:hover { background: #3d3db5; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(43,43,136,0.5); }
  </style>

  <script>
    // ─── AUDIO MANAGER ──────────────────────────────────────
    const AudioManager = {
      waves: new Audio('waves.mp3'), birds: new Audio('birds.mp3'), waves2: new Audio('waves2.mp3'),
      timers: [],
      init: function () {
        this.waves.loop = true; this.waves.volume = 0.4;
        this.birds.volume = 0.6;
        this.birds.addEventListener('ended', () => this.scheduleNextBird());
        this.waves2.volume = 0; this.waves2.loop = true;
      },
      start: function () { this.waves.play().catch(()=>{}); this.scheduleNextBird(); this.scheduleWaves2(); },
      stop: function () { this.waves.pause(); this.birds.pause(); this.waves2.pause(); this.timers.forEach(t=>clearTimeout(t)); this.timers=[]; },
      scheduleNextBird: function () {
        this.timers.push(setTimeout(() => { this.birds.currentTime=0; this.birds.play().catch(()=>{}); }, Math.random()*17000+8000));
      },
      scheduleWaves2: function () {
        this.timers.push(setTimeout(() => this.playWaves2Swell(), Math.random()*20000+10000));
      },
      playWaves2Swell: function () {
        this.waves2.currentTime=0; this.waves2.play().catch(()=>{});
        const tv=Math.random()*0.5+0.3, dur=Math.random()*10000+8000, fi=Math.random()*3000+2000, fo=Math.random()*3000+2000;
        this.fadeAudio(this.waves2, 0, tv, fi, () => {
          this.timers.push(setTimeout(() => { this.fadeAudio(this.waves2, tv, 0, fo, () => { this.waves2.pause(); this.scheduleWaves2(); }); }, dur));
        });
      },
      fadeAudio: function (audio, s, e, dur, cb) {
        const steps=60, st=dur/steps, vs=(e-s)/steps; let c=0;
        const iv=setInterval(() => { c++; audio.volume=Math.max(0,Math.min(1,s+vs*c)); if(c>=steps){clearInterval(iv);if(cb)cb();} }, st);
        this.timers.push(iv);
      }
    };
    AudioManager.init();

    // ─── COMPONENT: DRAW THICK 3D LINE ──────────────────────
    AFRAME.registerComponent('draw-line', {
      schema: {
        start: {type: 'vec3', default: {x:0, y:0, z:0}},
        end:   {type: 'vec3', default: {x:1, y:1, z:1}},
        color: {type: 'color', default: '#000'},
        radius:{type: 'number', default: 0.012}
      },
      init: function () { this.update(); },
      update: function () {
        const d = this.data;
        const p1 = new THREE.Vector3(d.start.x, d.start.y, d.start.z);
        const p2 = new THREE.Vector3(d.end.x, d.end.y, d.end.z);
        const distance = p1.distanceTo(p2);
        
        if(distance < 0.001) return; 

        const midPoint = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
        this.el.setAttribute('geometry', `primitive: cylinder; radius: ${d.radius}; height: ${distance}; segmentsRadial: 6`);
        this.el.setAttribute('material', `color: ${d.color}; shader: flat`);
        this.el.object3D.position.copy(midPoint);
        
        const direction = new THREE.Vector3().subVectors(p2, p1).normalize();
        this.el.object3D.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
      }
    });

    // ─── COMPONENT: DRAW FILLED POLYGON ─────────────────────
    AFRAME.registerComponent('draw-polygon', {
      schema: {
        vertices: {type: 'string', default: ''},
        color: {type: 'color', default: '#FFFFFF'},
        opacity: {type: 'number', default: 0.9}
      },
      init: function () {
        const ptsStr = this.data.vertices.split('|');
        if (ptsStr.length < 3) return;

        const geometry = new THREE.BufferGeometry();
        const vertices = [];

        const v0 = ptsStr[0].split(',').map(Number);
        for(let i = 1; i < ptsStr.length - 1; i++) {
            const v1 = ptsStr[i].split(',').map(Number);
            const v2 = ptsStr[i+1].split(',').map(Number);
            vertices.push(v0[0], v0[1], v0[2], v1[0], v1[1], v1[2], v2[0], v2[1], v2[2]);
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.computeVertexNormals();

        const material = new THREE.MeshBasicMaterial({ 
            color: this.data.color, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: this.data.opacity,
            depthWrite: false 
        });
        const mesh = new THREE.Mesh(geometry, material);
        this.el.setObject3D('mesh', mesh);
      }
    });

    // ─── INTERACTION ────────────────────────────────────────
    AFRAME.registerComponent('ortho-interaction', {
      init: function () {
        this.el.addEventListener('triggerdown', (e) => {
            const raycaster = this.el.components.raycaster;
            if (!raycaster) return;
            const hits = raycaster.intersectedEls;
            for (let i = 0; i < hits.length; i++) {
                if (hits[i].classList.contains('interactive')) {
                    hits[i].emit('click');
                    if (this.el.components.haptics) this.el.components.haptics.pulse(0.5, 50);
                    break; 
                }
            }
        });
      }
    });
  </script>
</head>

<body>

  <script>
    // ─── 3D MATH & DYNAMIC GENERATOR ENGINE ──────────────────────
    const C_BASE = '#3A0CA3'; // Deep Purple
    const C_TOP  = '#F72585'; // Neon Pink
    const C_LATERALS = ['#4CC9F0', '#43AA8B', '#F8961E', '#F9C74F', '#90BE6D', '#F3722C', '#9D4EDD', '#00BBF9', '#8338EC', '#FF006E', '#FFBE0B', '#38B000'];
    
    // We use long alphabets to support up to 12-sided figures (Approximating Cylinders/Cones)
    const BASE_ALPHABET = "ABCDEFGHIJKLMN";
    const TOP_ALPHABET  = "PQRSTUVWXYZA1B1";

    function rotPoint(x, y, z, rx, ry, rz) {
        let x1 = x * Math.cos(rz) - y * Math.sin(rz);
        let y1 = x * Math.sin(rz) + y * Math.cos(rz);
        let z1 = z;
        
        let x2 = x1;
        let y2 = y1 * Math.cos(rx) - z1 * Math.sin(rx);
        let z2 = y1 * Math.sin(rx) + z1 * Math.cos(rx);
        
        let x3 = x2 * Math.cos(ry) + z2 * Math.sin(ry);
        let y3 = y2;
        let z3 = -x2 * Math.sin(ry) + z2 * Math.cos(ry);
        return [x3, y3, z3];
    }

    function transformObj(pts, rx_deg, ry_deg, rz_deg, cx, cy, cz) {
        const rx = rx_deg * Math.PI / 180;
        const ry = ry_deg * Math.PI / 180;
        const rz = rz_deg * Math.PI / 180;
        let res = {};
        for(let key in pts) {
            let [nx, ny, nz] = rotPoint(pts[key][0], pts[key][1], pts[key][2], rx, ry, rz);
            res[key] = [nx + cx, ny + cy, nz + cz];
        }
        return res;
    }

    // Identify which labels to draw (to prevent clutter on 12-sided shapes)
    function generateLabelMask(sides, keys) {
        if(sides < 8) return keys; 
        return keys.filter((k, i) => i % 3 === 0 || k === 'O'); // Just cardinal points
    }

    // 1. Prism Generator
    function genPrism(sides, radius, height, rx, ry, rz, cx, cy, cz) {
        let pts = {};
        let startAngle = (sides === 4) ? Math.PI/4 : (sides === 3) ? -Math.PI/2 : 0;
        let bottomFace = [], topFace = [];
        
        for(let i=0; i<sides; i++) {
            let angle = startAngle + (i * 2 * Math.PI / sides);
            pts[BASE_ALPHABET[i]] = [Math.cos(angle)*radius, -height/2, Math.sin(angle)*radius];
            pts[TOP_ALPHABET[i]]  = [Math.cos(angle)*radius, height/2, Math.sin(angle)*radius];
            bottomFace.push(BASE_ALPHABET[i]);
            topFace.push(TOP_ALPHABET[i]);
        }
        
        let faces = [{ v: bottomFace.reverse(), color: C_BASE }, { v: topFace, color: C_TOP }];
        for(let i=0; i<sides; i++) {
            let next = (i+1)%sides;
            faces.push({ v: [BASE_ALPHABET[i], BASE_ALPHABET[next], TOP_ALPHABET[next], TOP_ALPHABET[i]], color: C_LATERALS[i % C_LATERALS.length] });
        }
        return { vertices: transformObj(pts, rx, ry, rz, cx, cy, cz), faces: faces, labelPoints: generateLabelMask(sides, Object.keys(pts)) };
    }

    // 2. Pyramid Generator
    function genPyramid(sides, radius, height, rx, ry, rz, cx, cy, cz) {
        let pts = {};
        let startAngle = (sides === 4) ? Math.PI/4 : (sides === 3) ? -Math.PI/2 : 0;
        let bottomFace = [];
        
        for(let i=0; i<sides; i++) {
            let angle = startAngle + (i * 2 * Math.PI / sides);
            pts[BASE_ALPHABET[i]] = [Math.cos(angle)*radius, -height/2, Math.sin(angle)*radius];
            bottomFace.push(BASE_ALPHABET[i]);
        }
        pts['O'] = [0, height/2, 0];

        let faces = [{ v: bottomFace.reverse(), color: C_BASE }];
        for(let i=0; i<sides; i++) {
            let next = (i+1)%sides;
            faces.push({ v: [BASE_ALPHABET[i], BASE_ALPHABET[next], 'O'], color: C_LATERALS[i % C_LATERALS.length] });
        }
        return { vertices: transformObj(pts, rx, ry, rz, cx, cy, cz), faces: faces, labelPoints: generateLabelMask(sides, Object.keys(pts)) };
    }

    // 3. Frustum Generator
    function genFrustum(sides, rBase, rTop, height, rx, ry, rz, cx, cy, cz) {
        let pts = {};
        let startAngle = (sides === 4) ? Math.PI/4 : 0;
        let bottomFace = [], topFace = [];
        for(let i=0; i<sides; i++) {
            let angle = startAngle + (i * 2 * Math.PI / sides);
            pts[BASE_ALPHABET[i]] = [Math.cos(angle)*rBase, -height/2, Math.sin(angle)*rBase];
            pts[TOP_ALPHABET[i]]  = [Math.cos(angle)*rTop, height/2, Math.sin(angle)*rTop];
            bottomFace.push(BASE_ALPHABET[i]);
            topFace.push(TOP_ALPHABET[i]);
        }
        let faces = [{ v: bottomFace.reverse(), color: C_BASE }, { v: topFace, color: C_TOP }];
        for(let i=0; i<sides; i++) {
            let next = (i+1)%sides;
            faces.push({ v: [BASE_ALPHABET[i], BASE_ALPHABET[next], TOP_ALPHABET[next], TOP_ALPHABET[i]], color: C_LATERALS[i % C_LATERALS.length] });
        }
        return { vertices: transformObj(pts, rx, ry, rz, cx, cy, cz), faces: faces, labelPoints: generateLabelMask(sides, Object.keys(pts)) };
    }

    // 4. Truncated Prism Generator (Cut by inclined plane along X axis)
    function genTruncatedPrism(sides, radius, height, cutAngDeg, rx, ry, rz, cx, cy, cz) {
        let pts = {};
        let startAngle = (sides === 4) ? Math.PI/4 : 0;
        let bottomFace = [], topFace = [];
        let cutRad = cutAngDeg * Math.PI / 180;

        for(let i=0; i<sides; i++) {
            let angle = startAngle + (i * 2 * Math.PI / sides);
            let px = Math.cos(angle)*radius;
            let pz = Math.sin(angle)*radius;
            pts[BASE_ALPHABET[i]] = [px, -height/2, pz];
            
            // Sloped Cut
            let topY = (height/2) - (px * Math.tan(cutRad));
            pts[TOP_ALPHABET[i]]  = [px, topY, pz];
            
            bottomFace.push(BASE_ALPHABET[i]);
            topFace.push(TOP_ALPHABET[i]);
        }
        let faces = [{ v: bottomFace.reverse(), color: C_BASE }, { v: topFace, color: C_TOP }];
        for(let i=0; i<sides; i++) {
            let next = (i+1)%sides;
            faces.push({ v: [BASE_ALPHABET[i], BASE_ALPHABET[next], TOP_ALPHABET[next], TOP_ALPHABET[i]], color: C_LATERALS[i % C_LATERALS.length] });
        }
        return { vertices: transformObj(pts, rx, ry, rz, cx, cy, cz), faces: faces, labelPoints: generateLabelMask(sides, Object.keys(pts)) };
    }

    // ─── DYNAMIC CURRICULUM FACTORY (30 LEVELS) ─────────────────────
    const levels = [
        // PHASE 1: Basics (1-5)
        { desc: "1. Square Prism axis perpendicular to HP.", gen: (rot) => genPrism(4, 0.3, 0.6, 0, 45+rot, 0, 0, 1.0, 1.0) },
        { desc: "2. Hexagonal Pyramid axis perpendicular to HP.", gen: (rot) => genPyramid(6, 0.3, 0.6, 0, 30+rot, 0, 0, 1.0, 1.0) },
        { desc: "3. Cylinder (12-sided approx) resting on HP.", gen: (rot) => genPrism(12, 0.3, 0.6, 0, rot, 0, 0, 1.0, 1.0) },
        { desc: "4. Cone (12-sided approx) resting on HP.", gen: (rot) => genPyramid(12, 0.3, 0.6, 0, rot, 0, 0, 1.0, 1.0) },
        { desc: "5. Cube resting on its base.", gen: (rot) => genPrism(4, 0.3, 0.424, 0, 45+rot, 0, 0, 1.0, 1.0) },

        // PHASE 2: Axis Perpendicular to VP (6-10)
        { desc: "6. Hexagonal Prism axis perpendicular to VP.", gen: (rot) => genPrism(6, 0.3, 0.6, 90, rot, 30, 0, 1.0, 1.0) },
        { desc: "7. Square Pyramid axis perpendicular to VP.", gen: (rot) => genPyramid(4, 0.3, 0.6, 90, rot, 45, 0, 1.0, 1.0) },
        { desc: "8. Cylinder axis perpendicular to VP.", gen: (rot) => genPrism(12, 0.3, 0.6, 90, rot, 0, 0, 1.0, 1.0) },
        { desc: "9. Cone axis perpendicular to VP.", gen: (rot) => genPyramid(12, 0.3, 0.6, 90, rot, 0, 0, 1.0, 1.0) },
        { desc: "10. Triangular Prism axis perpendicular to VP.", gen: (rot) => genPrism(3, 0.3, 0.8, 90, rot, -90, 0, 1.0, 1.0) },

        // PHASE 3: Single Inclinations (11-15)
        { desc: "11. Square Prism inclined to HP, resting on a base edge.", gen: (rot) => genPrism(4, 0.3, 0.6, 30, 45+rot, 0, 0, 1.0, 1.0) },
        { desc: "12. Hexagonal Pyramid inclined to HP, resting on a base edge.", gen: (rot) => genPyramid(6, 0.3, 0.6, 45, 30+rot, 0, 0, 1.0, 1.0) },
        { desc: "13. Pentagonal Prism inclined to HP, resting on a base corner.", gen: (rot) => genPrism(5, 0.3, 0.6, 45, -18+rot, 0, 0, 1.0, 1.0) },
        { desc: "14. Cone resting on a point of its base circle on HP, axis inclined 45°.", gen: (rot) => genPyramid(12, 0.3, 0.6, 45, rot, 0, 0, 1.0, 1.0) },
        { desc: "15. Hexagonal Prism resting on a rectangular face on HP.", gen: (rot) => genPrism(6, 0.3, 0.6, 0, 30+rot, 30, 0, 1.0, 1.0) },

        // PHASE 4: Double Inclinations (16-20)
        { desc: "16. DOUBLE INC: Square Prism axis inclined 45° to HP and 30° to VP.", gen: (rot) => genPrism(4, 0.3, 0.6, 45, 30+rot, 45, 0, 1.0, 1.0) },
        { desc: "17. DOUBLE INC: Hexagonal Pyramid axis inclined 45° to HP and 45° to VP.", gen: (rot) => genPyramid(6, 0.3, 0.6, 45, 45+rot, 30, 0, 1.0, 1.0) },
        { desc: "18. DOUBLE INC: Cone resting on base point, doubly inclined.", gen: (rot) => genPyramid(12, 0.3, 0.6, 45, 30+rot, 0, 0, 1.0, 1.0) },
        { desc: "19. DOUBLE INC: Tetrahedron resting on corner.", gen: (rot) => genPyramid(3, 0.3, 0.6, 45, 45+rot, -90, 0, 1.0, 1.0) },
        { desc: "20. DOUBLE INC: Cube resting on corner, diagonal perpendicular to HP.", gen: (rot) => genPrism(4, 0.3, 0.424, 54.7, 45+rot, 0, 0, 1.0, 1.0) },

        // PHASE 5: Frustums & Truncated Solids (21-25)
        { desc: "21. Frustum of Square Pyramid axis perpendicular to HP.", gen: (rot) => genFrustum(4, 0.3, 0.15, 0.6, 0, 45+rot, 0, 0, 1.0, 1.0) },
        { desc: "22. Frustum of Hexagonal Pyramid doubly inclined.", gen: (rot) => genFrustum(6, 0.3, 0.15, 0.6, 45, 30+rot, 0, 0, 1.0, 1.0) },
        { desc: "23. Truncated Pentagonal Prism cut by plane inclined at 30°.", gen: (rot) => genTruncatedPrism(5, 0.3, 0.6, 30, 0, 18+rot, 0, 0, 1.0, 1.0) },
        { desc: "24. Truncated Cylinder (12-sided) cut by plane.", gen: (rot) => genTruncatedPrism(12, 0.3, 0.6, 30, 0, rot, 0, 0, 1.0, 1.0) },
        { desc: "25. Frustum of a Cone (12-sided) doubly inclined.", gen: (rot) => genFrustum(12, 0.3, 0.15, 0.6, 45, 45+rot, 0, 0, 1.0, 1.0) },

        // PHASE 6: College-Level Extremes (26-30)
        { desc: "26. EXTREME: Hexagonal Pyramid resting on a SLANT EDGE on HP.", gen: (rot) => genPyramid(6, 0.3, 0.6, 63.4, rot, 30, 0, 1.0, 1.0) },
        { desc: "27. EXTREME: Square Pyramid resting on a TRIANGULAR FACE on HP.", gen: (rot) => genPyramid(4, 0.3, 0.6, 63.4, 45+rot, 0, 0, 1.0, 1.0) },
        { desc: "28. EXTREME: Truncated Square Prism resting on its sloped cut face.", gen: (rot) => genTruncatedPrism(4, 0.3, 0.6, 30, 120, 45+rot, 0, 0, 1.0, 1.0) },
        { desc: "29. EXTREME: Frustum of Pentagonal Pyramid resting on smaller base, doubly inclined.", gen: (rot) => genFrustum(5, 0.15, 0.3, 0.6, 45, 30+rot, 180, 0, 1.0, 1.0) },
        { desc: "30. EXTREME: Truncated Cylinder heavily inclined to both HP and VP.", gen: (rot) => genTruncatedPrism(12, 0.3, 0.6, 45, 45, 45+rot, 0, 0, 1.0, 1.0) }
    ];

    let currentLevel = 0;
    let userRotationY = 0; // State variable for dynamic rotation

    const elElements3D = document.getElementById('elements-3d');
    const elVpDrawings = document.getElementById('vp-drawings');
    const elHpDrawings = document.getElementById('hp-drawings');
    const txtLevel = document.getElementById('level-indicator');
    const txtDesc = document.getElementById('desc-text');

    function createHTMLNode(tag, attributes) {
        const el = document.createElement(tag);
        for(let key in attributes) el.setAttribute(key, attributes[key]);
        return el;
    }

    function getFaceDepth(vertices, faceVerts, axis) {
        let sum = 0;
        faceVerts.forEach(v => { sum += vertices[v][axis]; });
        return sum / faceVerts.length;
    }

    function renderLevel(idx) {
        elElements3D.innerHTML = '';
        elVpDrawings.innerHTML = '';
        elHpDrawings.innerHTML = '';

        const data = levels[idx];
        txtLevel.setAttribute('value', `LEVEL ${idx + 1} / 30`);
        txtDesc.setAttribute('value', data.desc);

        // Generate solid dynamically with current user rotation offset
        const solid = data.gen(userRotationY);

        const colorChalk = '#FFFFFF';
        const colorProj = '#AAAAAA';

        // 1. Draw Faces and Projections
        solid.faces.forEach((face) => {
            const faceVerts = face.v;
            let pts3D = faceVerts.map(v => `${solid.vertices[v][0]},${solid.vertices[v][1]},${solid.vertices[v][2]}`).join('|');
            
            let avgZ = getFaceDepth(solid.vertices, faceVerts, 2);
            let avgY = getFaceDepth(solid.vertices, faceVerts, 1);
            let offsetVP = 0.015 + (avgZ * 0.005);
            let offsetHP = 0.015 + (avgY * 0.005);

            let ptsVP = faceVerts.map(v => `${solid.vertices[v][0]},${solid.vertices[v][1]},${offsetVP}`).join('|');
            let ptsHP = faceVerts.map(v => `${solid.vertices[v][0]},${offsetHP},${solid.vertices[v][2]}`).join('|');

            elElements3D.appendChild(createHTMLNode('a-entity', { 'draw-polygon': `vertices: ${pts3D}; color: ${face.color}; opacity: 1.0` }));
            elVpDrawings.appendChild(createHTMLNode('a-entity', { 'draw-polygon': `vertices: ${ptsVP}; color: ${face.color}; opacity: 0.65` }));
            elHpDrawings.appendChild(createHTMLNode('a-entity', { 'draw-polygon': `vertices: ${ptsHP}; color: ${face.color}; opacity: 0.65` }));

            for(let i=0; i<faceVerts.length; i++) {
                let p1 = solid.vertices[faceVerts[i]];
                let p2 = solid.vertices[faceVerts[(i+1)%faceVerts.length]];
                elElements3D.appendChild(createHTMLNode('a-entity', { 'draw-line': `start: ${p1[0]} ${p1[1]} ${p1[2]}; end: ${p2[0]} ${p2[1]} ${p2[2]}; color: #111; radius: 0.008` }));
                elVpDrawings.appendChild(createHTMLNode('a-entity', { 'draw-line': `start: ${p1[0]} ${p1[1]} ${offsetVP+0.002}; end: ${p2[0]} ${p2[1]} ${offsetVP+0.002}; color: ${colorChalk}; radius: 0.005` }));
                elHpDrawings.appendChild(createHTMLNode('a-entity', { 'draw-line': `start: ${p1[0]} ${offsetHP+0.002} ${p1[2]}; end: ${p2[0]} ${offsetHP+0.002} ${p2[2]}; color: ${colorChalk}; radius: 0.005` }));
            }
        });

        // 2. Draw Projectors and Labels
        for(let key in solid.vertices) {
            if(!solid.labelPoints.includes(key)) continue; // Skip labels to avoid clutter on high-poly models

            let p = solid.vertices[key];
            
            elElements3D.appendChild(createHTMLNode('a-sphere', { position: `${p[0]} ${p[1]} ${p[2]}`, radius: '0.02', color: '#111' }));
            elElements3D.appendChild(createHTMLNode('a-text', { value: key, position: `${p[0]+0.06} ${p[1]+0.06} ${p[2]}`, color: '#FFF', align: 'center', scale: '0.7 0.7 0.7' }));

            elElements3D.appendChild(createHTMLNode('a-entity', { line: `start: ${p[0]} ${p[1]} ${p[2]}; end: ${p[0]} ${p[1]} 0; color: ${colorProj}; opacity: 0.25` }));
            elElements3D.appendChild(createHTMLNode('a-entity', { line: `start: ${p[0]} ${p[1]} ${p[2]}; end: ${p[0]} 0 ${p[2]}; color: ${colorProj}; opacity: 0.25` }));

            elVpDrawings.appendChild(createHTMLNode('a-text', { value: `${key.toLowerCase()}'`, position: `${p[0]+0.06} ${p[1]-0.06} 0.05`, color: colorChalk, align: 'center', scale: '0.6 0.6 0.6' }));
            elHpDrawings.appendChild(createHTMLNode('a-text', { value: key.toLowerCase(), position: `${p[0]+0.06} 0.05 ${p[2]+0.06}`, rotation: '-90 0 0', color: colorChalk, align: 'center', scale: '0.6 0.6 0.6' }));
        }
    }

    function loadLevel(idx) {
        if (idx < 0) idx = 0;
        if (idx >= levels.length) idx = levels.length - 1;
        currentLevel = idx;
        userRotationY = 0; // Reset rotation offset on level change
        renderLevel(currentLevel);
    }

    // Controls
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('overlay').style.display = 'none';
      if(AudioManager && AudioManager.start) AudioManager.start();
      loadLevel(0);
    });
    
    document.getElementById('btn-rot-ccw').addEventListener('click', () => { userRotationY -= 45; renderLevel(currentLevel); });
    document.getElementById('btn-rot-cw').addEventListener('click', () => { userRotationY += 45; renderLevel(currentLevel); });
    document.getElementById('btn-next').addEventListener('click', () => loadLevel(currentLevel + 1));
    document.getElementById('btn-prev').addEventListener('click', () => loadLevel(currentLevel - 1));
    document.getElementById('btn-home').addEventListener('click', () => { window.location.href = 'index.html'; });

    const scene = document.querySelector('a-scene');
    if (scene.hasLoaded) { document.getElementById('loading').style.display = 'none'; } 
    else { scene.addEventListener('loaded', () => { document.getElementById('loading').style.display = 'none'; }); }
  </script>
</body>
</html>
